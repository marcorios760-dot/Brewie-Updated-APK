<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ReBrewie Control</title><link rel="stylesheet" href="/static/css/app.css"></head><body><div class="phone-shell"><header><div><h1>Brewie+</h1><p>ReBrewie local controller</p></div><div id="conn" class="pill">offline</div></header><nav><button class="tab active" data-view="dash">Brew</button><button class="tab" data-view="recipe">Recipes</button><button class="tab" data-view="manual">Manual</button><button class="tab" data-view="settings">Info</button></nav><main><section id="dash" class="view active"><div class="hero"><div class="ring"><span id="progress">0%</span></div><div><h2 id="phase">Ready</h2><p><span id="mode">idle</span> · <span id="elapsed">0</span> min elapsed</p><p class="temp"><span id="temp">20.0</span>°C / target <span id="target">0</span>°C</p></div></div><div class="controls"><button onclick="cmd('start')" class="primary">Start</button><button onclick="cmd('pause')">Pause</button><button onclick="cmd('resume')">Resume</button><button onclick="cmd('stop')" class="danger">Stop</button></div><div class="cards"><div class="card"><b>Heater</b><span id="heater">off</span></div><div class="card"><b>Mash pump</b><span id="pumpMash">off</span></div><div class="card"><b>Sparge pump</b><span id="pumpSparge">off</span></div><div class="card"><b>Remaining</b><span id="remain">0 min</span></div></div></section><section id="recipe" class="view"><h2>Recipe editor</h2><div class="split"><form id="recipeForm"><input name="name" placeholder="Recipe name" required><input name="batch_l" type="number" step="0.1" value="20"><input name="boil_min" type="number" value="60"><textarea name="notes" placeholder="Notes"></textarea><button class="primary">Save recipe</button></form><div><h3>Saved recipes</h3><div id="recipes"></div></div></div></section><section id="manual" class="view"><h2>Manual controls</h2><p class="warn">Use with physical supervision. Do not run heaters or pumps dry.</p><div class="controls grid"><button onclick="cmd('heat_on')">Heat on</button><button onclick="cmd('heat_off')">Heat off</button><button onclick="cmd('pump_mash_on')">Mash pump on</button><button onclick="cmd('pump_mash_off')">Mash pump off</button><button onclick="cmd('pump_sparge_on')">Sparge pump on</button><button onclick="cmd('pump_sparge_off')">Sparge pump off</button><button onclick="cmd('valves_close')">Close valves</button></div></section><section id="settings" class="view"><h2>Machine info</h2><pre id="raw">Loading...</pre></section></main></div><script src="/static/js/app.js"></script></body></html>
